<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Glen and Dale Outdoor Services">
  <!-- Concept 1: Rustic Maritime — circle mark with G&D monogram, serif wordmark -->
  <defs>
    <style>
      .gd-mark { fill: #2D5016; }
      .gd-mark-text { fill: #FFFFFF; font-family: Georgia, "Times New Roman", serif; font-weight: 700; }
      .gd-word-primary { fill: #1A1A1A; font-family: Georgia, "Times New Roman", serif; font-weight: 700; }
      .gd-word-sub { fill: #5A5A5A; font-family: Helvetica, Arial, sans-serif; font-weight: 600; letter-spacing: 4px; }
      .gd-rule { stroke: #2D5016; stroke-width: 2; }
    </style>
  </defs>
  <circle class="gd-mark" cx="60" cy="60" r="50"/>
  <text class="gd-mark-text" x="60" y="74" font-size="38" text-anchor="middle">G&amp;D</text>
  <text class="gd-word-primary" x="135" y="58" font-size="34">Glen &amp; Dale</text>
  <line class="gd-rule" x1="135" y1="70" x2="490" y2="70"/>
  <text class="gd-word-sub" x="135" y="92" font-size="13">OUTDOOR SERVICES &#8226; SAINT JOHN, NB</text>
</svg>
