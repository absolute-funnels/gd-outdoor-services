<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Glen and Dale Outdoor Services">
  <!-- Concept 2: Clean modern — sans-serif wordmark, geometric ampersand mark, minimal palette -->
  <defs>
    <style>
      .c2-mark-bg { fill: #0F2F1B; }
      .c2-mark-text { fill: #C9D6A8; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 300; font-style: italic; }
      .c2-word { fill: #0F2F1B; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 700; letter-spacing: -1px; }
      .c2-sub { fill: #6B7261; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 500; letter-spacing: 6px; }
    </style>
  </defs>
  <rect class="c2-mark-bg" x="10" y="20" width="80" height="80" rx="8"/>
  <text class="c2-mark-text" x="50" y="78" font-size="56" text-anchor="middle">&amp;</text>
  <text class="c2-word" x="110" y="62" font-size="36">Glen &amp; Dale</text>
  <text class="c2-sub" x="110" y="90" font-size="11">OUTDOOR SERVICES</text>
</svg>
